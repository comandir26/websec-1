<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <title>Мой калькулятор</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="flex-container">
            <div class="input-block">
                <div class="inputs-row">
                    <input type="text" class="cell" id="val1">
                    <select class="cell" id="operation">
                        <option value="+">+</option>
                        <option value="-">-</option>
                        <option value="*">*</option>
                        <option value="/">/</option>
                    </select>
                    <input type="text" class="cell" id="val2">
                </div>
            </div>

            <div class="button-block">
                <button class="calc-button" onclick="calc()">подсчитать</button>
            </div>

            <div class="result-block">
                <div class="cell" id="result"></div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
